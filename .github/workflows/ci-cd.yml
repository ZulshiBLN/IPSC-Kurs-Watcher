name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - prerelease
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
      - prerelease

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate Code
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
        with:
          powershell-version: '7.4'

      - name: Run build validation
        shell: pwsh
        run: |
          .\build.ps1 -Validate
          if ($LASTEXITCODE -ne 0) {
            exit 1
          }

      - name: Check module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path "IPSC-Kurs-Watcher.psd1" -ErrorAction SilentlyContinue
          if (-not $manifest) {
            Write-Error "Module manifest validation failed"
            exit 1
          }
          Write-Host "Manifest validated: $($manifest.Name) v$($manifest.Version)"

  test:
    name: Run Tests
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
        with:
          powershell-version: '7.4'

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module Pester -ListAvailable)) {
            Install-Module -Name Pester -Force -SkipPublisherCheck
          }

      - name: Run Unit Tests
        shell: pwsh
        id: test
        run: |
          $result = .\tests\Run-Tests.ps1 -Path ".\tests\Unit" -OutputFormat NUnitXml -OutputPath test-results.xml
          if ($LASTEXITCODE -ne 0) {
            exit 1
          }

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: test-results.xml
          retention-days: 30

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pester Test Results
          path: test-results.xml
          reporter: 'java-junit'
          fail-on-error: true

  analyze:
    name: Code Analysis
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          $results = Invoke-ScriptAnalyzer -Path "src" -Recurse -ReportSummary
          if ($results) {
            Write-Error "PSScriptAnalyzer found issues"
            $results | Format-List
            exit 1
          }

  security:
    name: Security Scan
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2

      - name: Check for secrets
        shell: pwsh
        run: |
          $secrets = Get-ChildItem -Path . -Recurse -Include "*.ps1", "*.json" |
            Where-Object { $_.FullName -notmatch "\.git" } |
            ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              if ($content -match '(password|api[_-]?key|secret|token)\s*[=:]\s*["\']?[^\s"\']+' -and $content -notmatch 'placeholder|example|<YOUR|default') {
                $_
              }
            }

          if ($secrets) {
            Write-Error "Potential secrets detected in files"
            $secrets | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host "No secrets detected"

  publish-psgallery:
    name: Publish to PowerShell Gallery
    runs-on: windows-latest
    needs: [test, analyze, security]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-beta') && !contains(github.ref, '-rc')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_KEY: ${{ secrets.PSGALLERY_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_KEY)) {
            Write-Error "PowerShell Gallery API key not configured"
            exit 1
          }

          $moduleName = "IPSC-Kurs-Watcher"
          $modulePath = "./$moduleName.psd1"

          if (-not (Test-Path $modulePath)) {
            Write-Error "Module manifest not found: $modulePath"
            exit 1
          }

          Write-Host "Publishing $moduleName to PowerShell Gallery..."
          Publish-Module -Path (Split-Path $modulePath) `
                        -NuGetApiKey $env:PSGALLERY_KEY `
                        -Repository PSGallery `
                        -Force `
                        -Verbose

          Write-Host "Module published successfully"

  publish-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test, analyze, security]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          IS_PRERELEASE=${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          echo "prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify on Completion
    runs-on: ubuntu-latest
    if: always()
    needs: [validate, test, analyze, security]
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.validate.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.analyze.result }}" = "failure" ] || \
             [ "${{ needs.security.result }}" = "failure" ]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "color=ff0000" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
            echo "color=00ff00" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        run: |
          echo "Pipeline ${{ steps.status.outputs.status }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Author: ${{ github.actor }}"
